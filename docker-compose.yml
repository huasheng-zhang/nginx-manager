version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: nginx_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nginx_manager
      POSTGRES_USER: nginx_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nginx_user -d nginx_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nginx_manager_network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: nginx_manager_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nginx_manager_network

  # Django Web 应用
  web:
    build: .
    container_name: nginx_manager_web
    restart: unless-stopped
    command: ./docker-entrypoint.sh
    environment:
      - DJANGO_SETTINGS_MODULE=nginx_manager.settings_production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - DB_HOST=db
      - DB_NAME=nginx_manager
      - DB_USER=nginx_user
      - DB_PASSWORD=${DB_PASSWORD:-changeme123}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_ADMIN_URL=${DJANGO_ADMIN_URL:-admin}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin123}
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nginx_manager_network

  # Celery Worker（异步任务）
  celery_worker:
    build: .
    container_name: nginx_manager_celery
    restart: unless-stopped
    command: celery -A nginx_manager worker -l INFO --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=nginx_manager.settings_production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - DB_HOST=db
      - DB_NAME=nginx_manager
      - DB_USER=nginx_user
      - DB_PASSWORD=${DB_PASSWORD:-changeme123}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nginx_manager_network

  # Celery Beat（定时任务）
  celery_beat:
    build: .
    container_name: nginx_manager_celery_beat
    restart: unless-stopped
    command: celery -A nginx_manager beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=nginx_manager.settings_production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - DB_HOST=db
      - DB_NAME=nginx_manager
      - DB_USER=nginx_user
      - DB_PASSWORD=${DB_PASSWORD:-changeme123}
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nginx_manager_network

  # Nginx 反向代理（可选，生产环境建议使用）
  nginx:
    image: nginx:alpine
    container_name: nginx_manager_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/app/staticfiles:ro
      - media:/app/media:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - nginx_manager_network
    profiles:
      - with_nginx

volumes:
  postgres_data:
  redis_data:
  staticfiles:
  media:

networks:
  nginx_manager_network:
    driver: bridge
